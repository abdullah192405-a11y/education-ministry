[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Force HTTP → HTTPS (must be listed before SPA fallback rules)
[[redirects]]
  from = "http://labforai.com"
  to = "https://labforai.com"
  status = 301
  force = true

[[redirects]]
  from = "http://labforai.com/*"
  to = "https://labforai.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.labforai.com"
  to = "https://www.labforai.com"
  status = 301
  force = true

[[redirects]]
  from = "http://www.labforai.com/*"
  to = "https://www.labforai.com/:splat"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

[[redirects]]
  from = "/api/challenge-report-pdf"
  to = "/.netlify/functions/challenge-report-pdf"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  # Functions are pre-bundled in postbuild (scripts/bundle-challenge-report-api.mjs).
  node_bundler = "none"
  external_node_modules = ["@sparticuz/chromium", "puppeteer-core", "puppeteer"]

[functions."challenge-report-pdf"]
  timeout = 60
