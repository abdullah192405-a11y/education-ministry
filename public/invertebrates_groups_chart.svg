
<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#fff7ed"/>
  
  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#9a3412">مجموعات الحيوانات اللافقارية (الأكثر شيوعاً) 🐛</text>
  
  <!-- Main Groups Layout -->
  
  <!-- 1. Arthropods (Top Left) -->
  <g transform="translate(50, 100)">
    <rect x="0" y="0" width="220" height="120" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
    <text x="110" y="30" text-anchor="middle" font-weight="bold" font-size="18" fill="#b91c1c">المفصليات 🐜</text>
    <text x="110" y="60" text-anchor="middle" font-size="14" fill="#991b1b">🕷️ العناكب</text>
    <text x="110" y="80" text-anchor="middle" font-size="14" fill="#991b1b">🦋 الحشرات</text>
    <text x="110" y="100" text-anchor="middle" font-size="14" fill="#991b1b">🦀 القشريات</text>
  </g>

  <!-- 2. Mollusks (Top Right) -->
  <g transform="translate(530, 100)">
    <rect x="0" y="0" width="220" height="120" rx="10" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
    <text x="110" y="30" text-anchor="middle" font-weight="bold" font-size="18" fill="#4338ca">الرخويات 🐌</text>
    <text x="110" y="60" text-anchor="middle" font-size="14" fill="#3730a3">🐙 الأخطبوط/الحبار</text>
    <text x="110" y="80" text-anchor="middle" font-size="14" fill="#3730a3">🐚 المحار/القواقع</text>
    <text x="110" y="100" text-anchor="middle" font-size="14" fill="#3730a3">لها جسم طري</text>
  </g>

  <!-- 3. Worms (Bottom Left) -->
  <g transform="translate(50, 400)">
    <rect x="0" y="0" width="220" height="120" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <text x="110" y="30" text-anchor="middle" font-weight="bold" font-size="18" fill="#15803d">الديدان 🪱</text>
    <text x="110" y="60" text-anchor="middle" font-size="14" fill="#166534">جسم أنبوبي طويل</text>
    <text x="110" y="80" text-anchor="middle" font-size="14" fill="#166534">ليس لها أرجل</text>
    <text x="110" y="100" text-anchor="middle" font-size="14" fill="#166534">تعيش في التربة/الماء</text>
  </g>

  <!-- 4. Echinoderms (Bottom Right) -->
  <g transform="translate(530, 400)">
    <rect x="0" y="0" width="220" height="120" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="110" y="30" text-anchor="middle" font-weight="bold" font-size="18" fill="#b45309">شوكيات الجلد ⭐</text>
    <text x="110" y="60" text-anchor="middle" font-size="14" fill="#92400e">تعيش في البحر</text>
    <text x="110" y="80" text-anchor="middle" font-size="14" fill="#92400e">لها أشواك</text>
    <text x="110" y="100" text-anchor="middle" font-size="14" fill="#92400e">مثل نجم البحر</text>
  </g>

  <!-- Center Connection -->
  <circle cx="400" cy="300" r="60" fill="#f3f4f6" stroke="#4b5563" stroke-width="2"/>
  <text x="400" y="290" text-anchor="middle" font-weight="bold" font-size="14" fill="#1f2937">القاسم المشترك</text>
  <text x="400" y="320" text-anchor="middle" font-weight="bold" font-size="20" fill="#dc2626">⛔ لا عمود فقري</text>

  <!-- Lines -->
  <line x1="270" y1="160" x2="350" y2="260" stroke="#9ca3af" stroke-width="2"/>
  <line x1="530" y1="160" x2="450" y2="260" stroke="#9ca3af" stroke-width="2"/>
  <line x1="270" y1="460" x2="350" y2="340" stroke="#9ca3af" stroke-width="2"/>
  <line x1="530" y1="460" x2="450" y2="340" stroke="#9ca3af" stroke-width="2"/>

</svg>
