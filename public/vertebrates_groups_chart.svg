
<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#ecfdf5"/>
  
  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#047857">مجموعات الحيوانات الفقارية (5 مجموعات) 🦴</text>
  
  <!-- Center Image -->
  <circle cx="400" cy="300" r="80" fill="#fff" stroke="#047857" stroke-width="3"/>
  <text x="400" y="310" text-anchor="middle" font-size="60">🦴</text>
  
  <!-- 1. Mammals (Top) -->
  <g transform="translate(325, 100)">
    <rect x="0" y="0" width="150" height="100" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="75" y="30" text-anchor="middle" font-weight="bold" fill="#1e40af">الثدييات 🦁</text>
    <text x="75" y="55" text-anchor="middle" font-size="12" fill="#1e3a8a">تلد وترضع</text>
    <text x="75" y="75" text-anchor="middle" font-size="12" fill="#1e3a8a">يغطيها شعر/فرو</text>
  </g>
  <line x1="400" y1="220" x2="400" y2="200" stroke="#047857" stroke-width="2"/>

  <!-- 2. Birds (Right Top) -->
  <g transform="translate(550, 180)">
    <rect x="0" y="0" width="150" height="100" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="75" y="30" text-anchor="middle" font-weight="bold" fill="#92400e">الطيور 🐦</text>
    <text x="75" y="55" text-anchor="middle" font-size="12" fill="#78350f">تبيض</text>
    <text x="75" y="75" text-anchor="middle" font-size="12" fill="#78350f">يغطيها ريش</text>
  </g>
  <line x1="480" y1="300" x2="550" y2="230" stroke="#047857" stroke-width="2"/>

  <!-- 3. Reptiles (Right Bottom) -->
  <g transform="translate(500, 400)">
    <rect x="0" y="0" width="150" height="100" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="75" y="30" text-anchor="middle" font-weight="bold" fill="#991b1b">الزواحف 🦎</text>
    <text x="75" y="55" text-anchor="middle" font-size="12" fill="#7f1d1d">تبيض</text>
    <text x="75" y="75" text-anchor="middle" font-size="12" fill="#7f1d1d">جلد جاف (حراشف)</text>
  </g>
  <line x1="460" y1="360" x2="575" y2="400" stroke="#047857" stroke-width="2"/>

  <!-- 4. Amphibians (Left Bottom) -->
  <g transform="translate(150, 400)">
    <rect x="0" y="0" width="150" height="100" rx="10" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
    <text x="75" y="30" text-anchor="middle" font-weight="bold" fill="#065f46">البرمائيات 🐸</text>
    <text x="75" y="55" text-anchor="middle" font-size="12" fill="#064e3b">بيض في الماء</text>
    <text x="75" y="75" text-anchor="middle" font-size="12" fill="#064e3b">جلد رطب</text>
  </g>
  <line x1="340" y1="360" x2="225" y2="400" stroke="#047857" stroke-width="2"/>

  <!-- 5. Fish (Left Top) -->
  <g transform="translate(100, 180)">
    <rect x="0" y="0" width="150" height="100" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="75" y="30" text-anchor="middle" font-weight="bold" fill="#075985">الأسماك 🐟</text>
    <text x="75" y="55" text-anchor="middle" font-size="12" fill="#0c4a6e">تتنفس بالخياشيم</text>
    <text x="75" y="75" text-anchor="middle" font-size="12" fill="#0c4a6e">يغطيها قشور</text>
  </g>
  <line x1="320" y1="300" x2="250" y2="230" stroke="#047857" stroke-width="2"/>

</svg>
